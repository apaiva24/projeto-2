<body>
    <h1>cadastro para outra realidade</h1>

    <form>
        <h2> precisamos da suas informações para que possamos ter o controle de sua viagem</h2>

        <label for="nome">nome:</label>
        <input type="text" nome="nosso" id="nome" placeholder="digite o seu nome" required>

        <label for="sexo">qual o seu sexo</label>
        <select name="sexo" id="sexo">
            <option>feminino</option>
            <option>masculino</option>
            
        </section>

        <label for="email">email:</label>
        <input type="email" nome="email" id="email" placeholder="digite o seu email" required>

        <label for="password">senha: </label>
        <input type="password" nome="password" id="password" placeholder="digite a sua senha" required>


        <label for="data-nascimento">data de nascimento</label>
        <input type="date" nome="data-nascimento" id="data-nascimento">


        <label for="cidade">cidade</label>
        <select name="cidade" id="cidade">

            <option>londrina</option>
            <option>maringá</option>
            <option>apucarana</option>

        </select>

        <label for="curso">já fez o curso</label>
        <input type="radio" nome="curso">
        sim
        <input type="radio" nome="curso">
        não

        <label>
            <input type="checkbox" nome="termos" id="termos">
            aceito os termos
        </label>

        <label>obsevação</label>
        <textarea rows="4"></textarea>

        <button type="submit">cadastrar</button>

    </form>
</body>
